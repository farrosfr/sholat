<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f6b5f">
    <title>Jadwal Sholat Indonesia</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="hero__content">
          <p class="eyebrow">Jadwal Sholat Indonesia</p>
          <h1 id="app-title">Countdown waktu sholat</h1>
          <p class="lede" id="location-label">Memuat jadwal Kab. Gresik...</p>
        </div>
        <div class="countdown-panel" aria-live="polite">
          <span class="panel-label">Berikutnya</span>
          <strong id="next-prayer">-</strong>
          <span id="next-time">--:--</span>
          <div class="timer-row">
            <div class="timer" id="countdown">--:--:--</div>
            <div class="countdown-actions">
              <button class="icon-button" id="theme-toggle" type="button" aria-label="Ganti tema" title="Ganti tema">
                <svg class="theme-icon theme-icon--dark" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="theme-icon theme-icon--light" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"></circle>
                  <line x1="12" y1="1" x2="12" y2="3"></line>
                  <line x1="12" y1="21" x2="12" y2="23"></line>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                  <line x1="1" y1="12" x2="3" y2="12"></line>
                  <line x1="21" y1="12" x2="23" y2="12"></line>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
              </button>
              <button class="icon-button" id="rotate-toggle" type="button" aria-label="Putar layar" title="Putar layar">
                <svg class="rotate-icon" viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                  <path d="M3 3v5h5"></path>
                </svg>
              </button>
              <button class="icon-button" id="fullscreen-toggle" type="button" aria-label="Tampilkan countdown layar penuh" aria-pressed="false">
              <svg class="fullscreen-icon fullscreen-icon--enter" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 3H3v5M16 3h5v5M21 16v5h-5M8 21H3v-5"></path>
              </svg>
              <svg class="fullscreen-icon fullscreen-icon--exit" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 3v6H3M15 3v6h6M21 15h-6v6M3 15h6v6"></path>
              </svg>
              </button>
            </div>
          </div>
          <p id="countdown-note">Mengambil jadwal terbaru.</p>
        </div>
      </section>

      <section class="controls" aria-label="Pilihan lokasi">
        <form class="search" id="search-form">
          <label for="city-input">Cari kota/kabupaten</label>
          <div class="search__row">
            <input id="city-input" name="city" type="search" autocomplete="off" placeholder="Contoh: Gresik, Surabaya, Bandung">
            <button type="submit">Cari</button>
          </div>
        </form>
        <button class="location-button" id="location-button" type="button">Gunakan lokasi saya</button>
      </section>

      <section class="status" id="status" role="status"></section>

      <section class="results" aria-label="Hasil pencarian">
        <div class="result-list" id="result-list"></div>
      </section>

      <section class="schedule" aria-labelledby="schedule-title">
        <div class="section-heading">
          <h2 id="schedule-title">Jadwal hari ini</h2>
          <p id="schedule-date">-</p>
        </div>
        <div class="schedule-grid" id="schedule-grid"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
